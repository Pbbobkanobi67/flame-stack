<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#1a2a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <polygon points="200,90 260,160 240,240 160,240 140,160" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.25"/>
  <polygon points="200,110 245,165 230,225 170,225 155,165" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
  <text x="200" y="180" text-anchor="middle" fill="#1a1a2e" font-family="system-ui" font-size="36" font-weight="700">C</text>
  <text x="200" y="290" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="600">Widget Charlie</text>
  <text x="200" y="315" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Great Value</text>
  <line x1="160" y1="340" x2="240" y2="340" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
</svg>
