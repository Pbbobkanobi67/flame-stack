  <text x="200" y="310" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="600">Widget Delta</text>
  <text x="200" y="335" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Limited Edition</text>
  <line x1="160" y1="360" x2="240" y2="360" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
