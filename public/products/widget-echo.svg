<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#1e3a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A"/>
      <stop offset="100%" style="stop-color:#FF8C5A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="160" r="70" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.2"/>
  <circle cx="200" cy="160" r="55" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="200" cy="160" r="40" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="200" cy="160" r="25" fill="none" stroke="#1a1a2e" stroke-width="2" opacity="0.4"/>
  <text x="200" y="175" text-anchor="middle" fill="#1a1a2e" font-family="system-ui" font-size="30" font-weight="700">E</text>
  <text x="200" y="290" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="22" font-weight="600">Widget Echo</text>
  <text x="200" y="315" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">All-Rounder</text>
  <line x1="160" y1="340" x2="240" y2="340" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
</svg>
